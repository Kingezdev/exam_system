services:
  # Web Service
  - type: web
    name: plasu-exam-system
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.3
      - key: WEB_CONCURRENCY
        value: 4

  # Database Service (PostgreSQL)
  - type: pserv
    name: plasu-exam-db
    env: docker
    envVars:
      - key: POSTGRES_DB
        value: plasu_exam_db
      - key: POSTGRES_USER
        value: plasu_exam_user
      - key: POSTGRES_PASSWORD
        # This will be auto-generated by Render
        generateValue: true
      - key: POSTGRES_VERSION
        value: 15
